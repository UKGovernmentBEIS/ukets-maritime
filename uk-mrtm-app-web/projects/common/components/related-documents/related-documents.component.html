@if (previewDocuments()?.length > 0) {
  <h2 class="govuk-heading-m" id="document-preview-title">Document preview</h2>
  <nav role="navigation" aria-labelledby="document-preview-title">
    <ul class="govuk-list govuk-!-font-size-16">
      @for (document of previewDocuments(); track $index) {
        <li>
          @if (!isDisabled()) {
            <a
              govukLink
              [routerLink]="[fileDownloadPrePath(), 'file-download', 'document-preview', document.documentType].flat()"
              target="_blank"
              [queryParams]="getDownloadLinkQueryParams(document)">
              {{ document.filename }}
            </a>
          } @else {
            <span>{{ document.filename }}</span>
          }
        </li>
      }
    </ul>
  </nav>
}
