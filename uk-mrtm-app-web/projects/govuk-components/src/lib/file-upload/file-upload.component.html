<label
  [for]="identifier"
  [id]="`l.${identifier}`"
  [class]="currentLabelSize()"
  [class.govuk-visually-hidden]="isLabelHidden()">
  {{ label() }}
</label>
@if (isTouched && control.invalid) {
  <govuk-error-message [errors]="control.errors" [identifier]="identifier" />
}
<input
  (blur)="onBlur()"
  (change)="onChange($event)"
  [accept]="accepted()"
  [class.govuk-file-upload--error]="control.invalid && isTouched"
  [disabled]="control.disabled"
  [id]="identifier"
  [multiple]="isMultiple()"
  [name]="identifier"
  class="govuk-file-upload"
  type="file" />
