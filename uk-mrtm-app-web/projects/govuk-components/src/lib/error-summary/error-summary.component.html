@if (errorList$ | async; as errorList) {
  <div #container aria-labelledby="error-summary-title" class="govuk-error-summary" role="alert" tabindex="-1">
    <h2 class="govuk-error-summary__title" id="error-summary-title">There is a problem</h2>
    <div class="govuk-error-summary__body">
      <ul class="govuk-list govuk-error-summary__list">
        @for (controlError of errorList; track $index) {
          @for (error of controlError.self | keyvalue; track $index) {
            <li>
              @if (controlError.path) {
                <a
                  #anchor
                  (click)="errorClick(controlError.path)"
                  [fragment]="`l.${controlError.path}`"
                  [state]="{ scrollSkip: true }"
                  [replaceUrl]="true"
                  queryParamsHandling="preserve"
                  routerLink=".">
                  {{ error.value }}
                </a>
              } @else {
                <strong class="govuk-error-summary__message-without-path">{{ error.value }}</strong>
              }
            </li>
          }
        }
      </ul>
    </div>
  </div>
}
