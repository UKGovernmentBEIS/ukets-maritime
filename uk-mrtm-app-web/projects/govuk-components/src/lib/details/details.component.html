<details
  class="govuk-details govuk-!-margin-bottom-{{ bottomSpacing() }}"
  [attr.open]="openOnInit() || null"
  (toggle)="onToggle($event)">
  <summary class="govuk-details__summary">
    <span class="govuk-details__summary-text">{{ summary() }}</span>
  </summary>
  <div class="govuk-details__text govuk-!-padding-bottom-{{ bottomContentPadding() }}">
    <ng-content></ng-content>
  </div>
</details>
