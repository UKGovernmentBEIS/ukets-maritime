<fieldset [id]="identifier" govukFieldset>
  @if (legend()) {
    <legend govukLegend [legendSize]="legendSize()">{{ legend() }}</legend>
  }
  @if (hint()) {
    <p class="govuk-hint">{{ hint() }}</p>
  }
  @if (shouldDisplayErrors) {
    <govuk-error-message [errors]="group.errors" [identifier]="identifier" />
  }

  <ng-content />
</fieldset>
