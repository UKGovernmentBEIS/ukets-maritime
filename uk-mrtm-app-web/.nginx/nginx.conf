server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  error_page 404 = @not_found;

  location = /maritime/index.html {
    try_files $uri @not_found;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location ~* ^/maritime/(?:assets|hmcts-assets)/ {
    try_files $uri @not_found;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
  }

  location ~* "^/maritime/[^/]+-[a-zA-Z0-9]{8,}\.(?:js|css|mjs)(?:\.map)?$" {
    try_files $uri @not_found;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* ^/maritime/.+\.(?:js|css|mjs|map|json|html|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|xlsx|pdf|txt)$ {
    try_files $uri @not_found;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location /maritime/ {
    try_files $uri $uri/ /maritime/index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  location / {
    return 301 /maritime/;
  }

  location @not_found {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    return 404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
