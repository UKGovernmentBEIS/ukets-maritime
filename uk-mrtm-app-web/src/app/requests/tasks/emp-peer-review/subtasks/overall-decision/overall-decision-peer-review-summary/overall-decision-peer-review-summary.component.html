@if (vm(); as vm) {
  <netz-page-heading [caption]="vm.overallDecisionMap.title">Check your answers</netz-page-heading>
  <mrtm-overall-decision-summary-template
    [determination]="vm.determination"
    [isEditable]="vm.isEditable"
    [wizardStep]="vm.wizardStep"
    [queryParams]="{ change: true }" />
  <div>
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
    <netz-return-to-task-or-action-page />
  </div>
}
