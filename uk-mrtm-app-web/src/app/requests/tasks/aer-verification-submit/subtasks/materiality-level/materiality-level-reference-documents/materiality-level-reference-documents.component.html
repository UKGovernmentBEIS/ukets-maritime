<mrtm-wizard-step
  (formSubmit)="onSubmit()"
  [caption]="materialityLevelMap.title"
  [formGroup]="formGroup"
  [heading]="materialityLevelMap.accreditationReferenceDocumentTypes.title"
  [showReturnLink]="true"
  [isTwoThirds]="true">
  <div
    formControlName="accreditationReferenceDocumentTypes"
    govuk-checkboxes
    label="For UK Emissions Trading Scheme (ETS)"
    labelSize="medium"
    hint="The listed documents include all modifications and amendments made to relevant legislation, unless otherwise stated.">
    @for (type of referenceDocumentTypes; track type) {
      <govuk-checkbox [value]="type" [label]="type | accreditationReferenceDocumentTypes">
        @if (type === 'OTHER') {
          <ng-container govukConditionalContent>
            <div
              formControlName="otherReference"
              govuk-textarea
              label="Reference details"
              labelSize="normal"
              [maxLength]="10000"></div>
          </ng-container>
        }
      </govuk-checkbox>
    }
  </div>
</mrtm-wizard-step>
