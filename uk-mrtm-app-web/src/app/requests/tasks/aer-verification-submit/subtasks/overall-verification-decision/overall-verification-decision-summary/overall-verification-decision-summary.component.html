<netz-page-heading [caption]="map.title">Check your answers</netz-page-heading>

<mrtm-aer-overall-verification-decision-summary-template
  [data]="overallVerificationDecision()"
  [isEditable]="isEditable()" />

@if (isEditable() && !isSubtaskCompleted()) {
  <button (click)="onSubmit()" netzPendingButton govukButton type="button">Confirm and continue</button>
}

<div>
  @if (isEditable() && !isSubtaskCompleted()) {
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
  }
  <netz-return-to-task-or-action-page />
</div>
