@if (vm(); as vm) {
  <mrtm-wizard-step
    [formGroup]="form"
    [heading]="vm.managementProceduresMap.decision.title"
    [caption]="vm.managementProceduresMap.title"
    (formSubmit)="onSubmit()"
    [hideSubmit]="!vm.isEditable"
    [showReturnLink]="true">
    <mrtm-management-procedures-summary-template
      [managementProcedures]="vm.managementProcedures"
      [managementProceduresMap]="vm.managementProceduresMap"
      [dataFlowFiles]="vm.dataFlowFiles"
      [riskAssessmentFiles]="vm.riskAssessmentFiles"
      [isEditable]="vm.isEditable"
      [wizardStep]="vm.wizardStep"
      [queryParams]="{ change: true }" />
    <mrtm-review-decision />
  </mrtm-wizard-step>
}
