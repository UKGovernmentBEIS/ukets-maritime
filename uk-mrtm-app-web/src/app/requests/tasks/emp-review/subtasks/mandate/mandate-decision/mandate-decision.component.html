<mrtm-wizard-step
  [formGroup]="form"
  [heading]="wizardMap.decision.title"
  [caption]="wizardMap.title"
  (formSubmit)="onSubmit()"
  [hideSubmit]="!isEditable()"
  [showReturnLink]="true">
  <mrtm-mandate-summary-template
    [mandate]="mandate()"
    [mandateMap]="mandateMap"
    [operatorName]="operatorName()"
    [wizardStep]="wizardStep"
    [queryParams]="{ change: true }"
    [isEditable]="isEditable()" />
  <mrtm-review-decision />
</mrtm-wizard-step>
