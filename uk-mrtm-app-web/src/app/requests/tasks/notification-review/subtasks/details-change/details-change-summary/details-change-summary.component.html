@if (vm(); as vm) {
  <netz-page-heading [caption]="vm.detailsChangeMap.title">Check your answers</netz-page-heading>

  <mrtm-notification-details-of-change-summary-template
    [detailsOfChange]="vm.detailsOfChange"
    [notificationFiles]="vm.notificationFiles" />

  <mrtm-notification-review-decision-summary-template
    [reviewDecision]="vm.reviewDecision"
    [isEditable]="vm.isEditable"
    [changeLink]="vm.wizardStep.REVIEW_DECISION"
    [queryParams]="{ change: true }" />

  @if (vm.isEditable && !vm.isSubTaskCompleted) {
    <button (click)="onSubmit()" netzPendingButton govukButton type="button">Confirm and complete</button>
  }
  <div>
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
    <netz-return-to-task-or-action-page />
  </div>
}
