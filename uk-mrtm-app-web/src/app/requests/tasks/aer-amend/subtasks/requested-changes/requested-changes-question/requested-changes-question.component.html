<mrtm-wizard-step
  [heading]="headerTitle"
  submitText="Confirm and complete"
  [formGroup]="form"
  [hideSubmit]="!isEditable()"
  (formSubmit)="onSubmit()">
  @for (amendsDecision of decisionForAmends(); track amendsDecision.subtask) {
    <mrtm-review-return-for-amends-subtask-summary-template
      [caption]="subtaskTitleMap[amendsDecision.subtask]"
      [reviewDecision]="amendsDecision.decision" />
  }

  @if (isEditable()) {
    <div label="confirmation" [isLabelHidden]="true" govuk-checkboxes formControlName="accepted">
      <govuk-checkbox label="I have made changes and want to mark this task as complete"></govuk-checkbox>
    </div>
  }
</mrtm-wizard-step>
<div>
  @if (isEditable()) {
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
  }
  <netz-return-to-task-or-action-page />
</div>
