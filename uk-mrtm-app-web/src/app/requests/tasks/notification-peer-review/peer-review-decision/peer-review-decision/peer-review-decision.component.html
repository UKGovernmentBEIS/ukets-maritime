<mrtm-wizard-step
  [formGroup]="form"
  heading="Peer review decision"
  caption="Peer review response"
  (formSubmit)="onSubmit()"
  [hideSubmit]="false"
  [showReturnLink]="true">
  <fieldset govukFieldset>
    <legend govukLegend legendSize="medium">What is your assessment of this determination?</legend>
    <div formControlName="accepted" govuk-radio>
      <govuk-radio-option [value]="true" label="I agree with the determination" />
      <govuk-radio-option [value]="false" label="I do not agree with the determination" />
    </div>
  </fieldset>
  <div
    govuk-textarea
    labelSize="medium"
    formControlName="notes"
    label="Add notes to support your decision"
    hint="The operator cannot view this"
    [maxLength]="10000"></div>
</mrtm-wizard-step>
