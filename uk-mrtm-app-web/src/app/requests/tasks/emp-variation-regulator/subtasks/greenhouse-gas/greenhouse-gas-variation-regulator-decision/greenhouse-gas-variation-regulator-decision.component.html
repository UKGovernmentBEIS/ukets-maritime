@if (vm(); as vm) {
  <mrtm-wizard-step
    [formGroup]="form"
    [heading]="vm.greenhouseGasMap.variationRegulatorDecision.title"
    [caption]="vm.greenhouseGasMap.title"
    (formSubmit)="onSubmit()"
    [hideSubmit]="!vm.isEditable"
    [showReturnLink]="true">
    <mrtm-greenhouses-summary-template
      [greenhouseGas]="vm.greenhouseGas"
      [originalGreenhouseGas]="vm.originalGreenhouseGas"
      [greenhouseGasMap]="vm.greenhouseGasMap"
      [isEditable]="vm.isEditable"
      [wizardStep]="vm.wizardStep"
      [queryParams]="{ change: true }" />
    <mrtm-variation-regulator-decision />
  </mrtm-wizard-step>
}
