<mrtm-wizard-step
  [formGroup]="form"
  [heading]="emissionsSubTasksMap.variationRegulatorDecision.title"
  [caption]="emissionsSubTasksMap.title"
  (formSubmit)="onSubmit()"
  [hideSubmit]="!isEditable"
  [showReturnLink]="true">
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <h2 class="govuk-heading-m">List of ships</h2>
    </div>
    @if (isEditable) {
      <div class="govuk-grid-column-one-third govuk-!-text-align-right govuk-body govuk-!-margin-bottom-0">
        <a [routerLink]="['../', 'list-of-ships']" [queryParams]="{ change: true }" govukLink>Change</a>
      </div>
    }
  </div>
  <mrtm-list-of-ships-summary-template [data]="ships" [originalShips]="originalShips" editUrl="../ships" />
  <mrtm-variation-regulator-decision />
</mrtm-wizard-step>
