<mrtm-wizard-step
  [formGroup]="form"
  [heading]="mandateMap.variationRegulatorDecision.title"
  [caption]="mandateMap.title"
  (formSubmit)="onSubmit()"
  [hideSubmit]="!isEditable"
  [showReturnLink]="true">
  <mrtm-mandate-summary-template
    [mandate]="mandate"
    [originalMandate]="originalMandate"
    [operatorName]="operatorName"
    [originalOperatorName]="originalOperatorName"
    [mandateMap]="mandateMap"
    [wizardStep]="wizardStep"
    [isEditable]="isEditable"
    [queryParams]="{ change: true }" />
  <mrtm-variation-regulator-decision />
</mrtm-wizard-step>
