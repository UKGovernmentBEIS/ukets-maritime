@if (vm(); as vm) {
  <mrtm-wizard-step
    [formGroup]="form"
    [heading]="vm.emissionSourcesMap.variationRegulatorDecision.title"
    [caption]="vm.emissionSourcesMap.title"
    (formSubmit)="onSubmit()"
    [hideSubmit]="!vm.isEditable"
    [showReturnLink]="true">
    <mrtm-emission-sources-summary-template
      [emissionSources]="vm.emissionSources"
      [originalEmissionSources]="vm.originalEmissionSources"
      [emissionSourcesMap]="vm.emissionSourcesMap"
      [isEditable]="vm.isEditable"
      [wizardStep]="vm.wizardStep"
      [queryParams]="{ change: true }" />
    <mrtm-variation-regulator-decision />
  </mrtm-wizard-step>
}
