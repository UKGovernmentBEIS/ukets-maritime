@if (vm(); as vm) {
  <mrtm-wizard-step
    [formGroup]="form"
    [heading]="vm.controlActivitiesMap.variationRegulatorDecision.title"
    [caption]="vm.controlActivitiesMap.title"
    (formSubmit)="onSubmit()"
    [hideSubmit]="!vm.isEditable"
    [showReturnLink]="true">
    <mrtm-control-activities-summary-template
      [controlActivities]="vm.controlActivities"
      [originalControlActivities]="vm.originalControlActivities"
      [controlActivitiesMap]="vm.controlActivitiesMap"
      [isEditable]="vm.isEditable"
      [wizardStep]="vm.wizardStep"
      [queryParams]="{ change: true }" />
    <mrtm-variation-regulator-decision />
  </mrtm-wizard-step>
}
