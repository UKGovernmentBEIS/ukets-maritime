@if (improvementComments(); as improvementComments) {
  <dl
    govuk-summary-list
    [hasBorders]="false"
    [hasBottomMargin]="false"
    class="govuk-!-margin-bottom-0 govuk-!-margin-top-4">
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey class="govuk-!-width-one-quarter">Actions for the operator</dt>
      <dd govukSummaryListRowValue class="pre-wrap">{{ improvementComments }}</dd>
    </div>
  </dl>
}
