@if (vm(); as vm) {
  <netz-page-heading [caption]="vm.abbreviationsMap.title">Check your answers</netz-page-heading>
  <mrtm-abbreviations-summary-template
    [abbreviations]="vm.abbreviations"
    [originalAbbreviations]="vm.originalAbbreviations"
    [abbreviationsMap]="vm.abbreviationsMap" />
  <mrtm-variation-regulator-decision-partial-summary-template
    [variationDecisionDetails]="vm.variationDecisionDetails" />
  <div>
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
    <netz-return-to-task-or-action-page />
  </div>
}
