@if (vm(); as vm) {
  <netz-page-heading [caption]="vm.title">Check your answers</netz-page-heading>
  <mrtm-variation-details-summary-template
    [variationDetails]="vm.variationDetails"
    [isVariationRegulator]="true"
    [regulatorLedReason]="vm.regulatorLedReason" />
  <div>
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
    <netz-return-to-task-or-action-page />
  </div>
}
