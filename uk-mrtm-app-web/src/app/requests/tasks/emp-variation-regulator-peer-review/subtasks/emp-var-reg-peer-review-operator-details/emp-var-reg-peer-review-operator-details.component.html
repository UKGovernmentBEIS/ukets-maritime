@if (vm(); as vm) {
  <netz-page-heading [caption]="vm.title">Check your answers</netz-page-heading>
  <mrtm-operator-details-summary-template
    [operatorDetails]="vm.operatorDetails"
    [files]="vm.files"
    [declarationFiles]="vm.declarationFiles"
    [originalOperatorDetails]="vm.originalOperatorDetails"
    [originalFiles]="vm.originalFiles"
    [originalDeclarationFiles]="vm.originalDeclarationFiles" />
  <mrtm-variation-regulator-decision-partial-summary-template
    [variationDecisionDetails]="vm.variationDecisionDetails" />
  <div>
    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
    <netz-return-to-task-or-action-page />
  </div>
}
