<netz-page-heading>Return for changes</netz-page-heading>

<p class="govuk-body">Check your information before sending</p>

@for (amendsDecision of decisionForAmends(); track amendsDecision.subtask) {
  <mrtm-review-return-for-amends-subtask-summary-template
    [caption]="subtaskTitleMap[amendsDecision.subtask]"
    [reviewDecision]="amendsDecision.decision" />
}

<button type="button" govukButton (click)="onSubmit()" netzPendingButton>Confirm and send</button>

<div>
  <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
  <netz-return-to-task-or-action-page />
</div>
