<netz-page-heading size="l">Are you sure you want to close this account?</netz-page-heading>
<p class="govuk-body">The account will be permanently closed.</p>
<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <p class="govuk-body">
      All operator history will remain in the account, but no actions will be possible, for example starting new tasks
      or editing account information.
    </p>
  </div>
</div>

<div class="govuk-button-group">
  <button govukWarnButton netzPendingButton (click)="onSubmit()" type="button">Yes, close this account</button>
</div>
