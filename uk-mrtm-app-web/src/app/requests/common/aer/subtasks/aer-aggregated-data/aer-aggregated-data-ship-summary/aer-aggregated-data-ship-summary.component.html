<mrtm-notification-banner />
<netz-page-heading
  [caption]="
    !aggregatedData()?.fromFetch ? wizardMap.annualAggregatedEmissions.caption + ' ' + ship()?.details?.name : undefined
  ">
  @if (aggregatedData()?.fromFetch) {
    Aggregated data for {{ ship()?.details?.name }}
  } @else {
    Check your answers
  }
</netz-page-heading>
@if (warningMessages()?.length) {
  <div class="govuk-!-width-two-thirds">
    @for (warningMessage of warningMessages(); track warningMessage) {
      <govuk-warning-text [assistiveText]="warningMessage" />
    }
  </div>
}
<mrtm-aer-aggregated-data-ship-summary-template
  [editable]="editable()"
  [aggregatedData]="aggregatedData()"
  [ship]="ship()" />

@if (canSubmit()) {
  <button (click)="onSubmit()" govukButton netzPendingButton type="button">Confirm and continue</button>
}

<div>
  <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
  <a govukLink [routerLink]="['../']">Return to: {{ wizardMap.title }}</a>
</div>
