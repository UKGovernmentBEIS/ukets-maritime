<div class="govuk-!-margin-top-5">
  <p class="govuk-body">{{ header() }}</p>
  <form [formGroup]="formGroup" (submit)="onFilter()">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-one-quarter">
        <div
          govuk-select
          [label]="header()"
          [isLabelHidden]="true"
          formControlName="filterByShip"
          [options]="items()"
          widthClass="govuk-!-width-full"></div>
      </div>
      <div class="govuk-grid-column-one-quarter">
        <button type="submit" govukButton>Apply</button>
      </div>
    </div>
  </form>
</div>
