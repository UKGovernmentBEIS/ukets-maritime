<netz-page-heading>{{ actionMap?.caption }}</netz-page-heading>

@if (actionMap?.text) {
  <p class="govuk-body">{{ actionMap.text }}</p>
}

<div class="govuk-button-group govuk-!-margin-top-9">
  <button type="button" (click)="recallTask()" netzPendingButton govukWarnButton>
    {{ actionMap?.buttonText ?? 'Yes, recall your response' }}
  </button>
  <a type="button" govukLink [routerLink]="['../']">Cancel</a>
</div>
<div>
  <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
  <netz-return-to-task-or-action-page />
</div>
