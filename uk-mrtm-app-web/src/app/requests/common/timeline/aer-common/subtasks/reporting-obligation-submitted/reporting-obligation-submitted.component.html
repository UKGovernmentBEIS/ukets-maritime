<netz-page-heading [caption]="map.title">{{ map.title }}</netz-page-heading>
<mrtm-reporting-obligation-summary-template
  [reportingYear]="reportingYear()"
  [reportingRequired]="reportingRequired()"
  [reportingObligationDetails]="reportingObligationDetails()"
  [files]="supportingDocuments()"
  [map]="map" />

@if (isReviewCompletedActionType() && decision()) {
  <mrtm-review-decision-summary-template [reviewDecision]="decision()" />
}

<netz-return-to-task-or-action-page />
