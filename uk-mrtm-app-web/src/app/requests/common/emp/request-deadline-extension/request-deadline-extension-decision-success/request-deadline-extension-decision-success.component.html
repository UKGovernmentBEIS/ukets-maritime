<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    @if (decision === 'ACCEPTED') {
      <govuk-panel title="Extension request approved" />
      <p class="govuk-body">The determination deadline has been updated to {{ extDueDate() | govukDate }}</p>
    } @else {
      <govuk-panel title="Extension request {{ decision | lowercase }}" />
    }
  </div>
</div>
<div>
  <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
  <a govukLink routerLink="/dashboard">Return to: Dashboard</a>
</div>
