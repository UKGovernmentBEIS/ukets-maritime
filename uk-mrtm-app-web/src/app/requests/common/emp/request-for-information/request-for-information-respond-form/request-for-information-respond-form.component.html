<mrtm-wizard-step
  [formGroup]="formGroup"
  submitText="Confirm and complete"
  (formSubmit)="onSubmit()"
  [hideSubmit]="!canBeDisplayed">
  @if (questionFiles()?.length) {
    <p class="govuk-body row-flex govuk-!-margin-right-0 govuk-!-margin-left-0">
      <span class="govuk-label--s govuk-!-margin-right-2">Files shared by the regulator:</span>
      <mrtm-summary-download-files [files]="questionFiles()" />
    </p>
  }

  <ng-container formArrayName="answers">
    @for (answer of answersCtrl.controls; track answer) {
      <p class="govuk-heading-m">Question {{ $index + 1 }}</p>
      <p class="govuk-body overflow-wrap pre-wrap">{{ questions?.questions[$index] }}</p>
      @if (canBeDisplayed) {
        <div
          govuk-textarea
          labelSize="medium"
          label="Your response"
          [formControlName]="$index"
          [maxLength]="10000"></div>
      }
    }
  </ng-container>

  @if (canBeDisplayed) {
    <mrtm-multiple-file-input
      [baseDownloadUrl]="downloadUrl"
      label="Upload a file (optional)"
      listTitle="Uploaded files"
      formControlName="files" />
  }
</mrtm-wizard-step>
