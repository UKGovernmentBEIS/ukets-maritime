<mrtm-wizard-step
  heading="Request for information"
  [formGroup]="formGroup"
  (formSubmit)="onSubmit()"
  [isTwoThirds]="true"
  [showReturnLink]="true">
  <ng-container formArrayName="questions">
    @for (control of questionsCtr.controls; track control; let i = $index) {
      <fieldset govukFieldset id="question-{{ i }}">
        <div class="govuk-grid-row">
          <div class="govuk-grid-column-two-thirds">
            <legend govukLegend legendSize="medium">Question {{ i > 0 ? i + 1 : '' }}</legend>
          </div>
          <div class="govuk-grid-column-one-third govuk-!-text-align-right">
            @if (questionsCtr.controls.length > 1) {
              <button (click)="removeQuestion(i)" govukSecondaryButton type="button">Remove</button>
            }
          </div>
        </div>
        <div govuk-textarea [maxLength]="10000" [formControlName]="i"></div>
      </fieldset>
    }
  </ng-container>
  <button (click)="addQuestion()" govukSecondaryButton type="button">Add another question</button>

  <mrtm-multiple-file-input
    [baseDownloadUrl]="downloadUrl"
    label="Upload a file (Optional)"
    listTitle="Uploaded files"
    formControlName="files"></mrtm-multiple-file-input>

  <div
    govuk-date-input
    label="Set response deadline"
    legendSize="medium"
    formControlName="deadline"
    hint="For example, 27 3 2022"></div>
</mrtm-wizard-step>
