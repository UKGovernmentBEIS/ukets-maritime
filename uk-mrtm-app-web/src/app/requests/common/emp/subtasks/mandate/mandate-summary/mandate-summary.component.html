@if (mandate(); as mandate) {
  <netz-page-heading [caption]="wizardMap.title">Check your answers</netz-page-heading>
  <mrtm-mandate-responsibility-summary-template
    [wizardStep]="wizardStep"
    [data]="mandate"
    [queryParams]="{ change: true }"
    [isEditable]="isEditable()" />

  @if (mandate.exist) {
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">
        <h3 class="govuk-heading-m">{{ wizardMap.registeredOwners.title }}</h3>
      </div>
      @if (isEditable()) {
        <div class="govuk-grid-column-one-third">
          <div class="govuk-body float-right">
            <a [routerLink]="[wizardStep.REGISTERED_OWNERS]" [queryParams]="{ change: true }" govukLink>Change</a>
          </div>
        </div>
      }
    </div>
    <mrtm-mandate-registered-owners-list-summary-template [data]="mandate.registeredOwners" />
    <mrtm-mandate-responsibility-declaration-summary-template
      [wizardStep]="wizardStep"
      [data]="mandate"
      [queryParams]="{ change: true }"
      [isEditable]="isEditable()" />
  }

  @if (hasReview()) {
    <mrtm-review-decision-summary-template
      [reviewDecision]="reviewDecision()"
      [isEditable]="isEditable()"
      [changeLink]="wizardStep.DECISION"
      [queryParams]="{ change: true }" />
  }

  @if (isEditable() && !isSubtaskCompleted()) {
    <button (click)="onSubmit()" netzPendingButton govukButton type="button">Confirm and continue</button>
  }

  <div>
    @if (isEditable() && !isSubtaskCompleted()) {
      <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />
    }
    <netz-return-to-task-or-action-page />
  </div>
}
