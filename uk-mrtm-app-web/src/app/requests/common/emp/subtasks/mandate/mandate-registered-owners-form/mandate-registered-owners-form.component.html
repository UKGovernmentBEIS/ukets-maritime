<mrtm-wizard-step
  [caption]="wizardMap.caption"
  [heading]="wizardMap.title"
  [formGroup]="form"
  (formSubmit)="onSubmit()">
  <div class="govuk-!-width-two-thirds">
    <h3 class="govuk-heading-m">Registered owner details</h3>
    <div govuk-text-input formControlName="name" label="Registered owner name"></div>
    <div
      govuk-text-input
      formControlName="imoNumber"
      widthClass="govuk-!-width-one-third"
      label="IMO unique company and registered owner identification number"
      hint="Must be 7 digits long"></div>
    <div govuk-text-input formControlName="contactName" label="Contact name"></div>
    <div govuk-text-input formControlName="email" label="Contact email"></div>
    <div
      label="Date of written agreement"
      hint="For example, 21/7/2024"
      widthClass="govuk-!-width-one-quarter"
      mrtm-date-picker
      formControlName="effectiveDate"></div>
  </div>
  <h3 class="govuk-heading-m" id="ismShipsTable">Select ships to associate</h3>
  <p class="govuk-body">
    The displayed list of ships includes ships where the nature of responsibility lies with the ISM company, and no
    registered owner has been added yet.
  </p>
  <mrtm-multi-select-table
    [columns]="columns"
    [data]="page()"
    (selectionChanged)="onShipsSelectionChanged()"
    emptyTableText="No items to display"
    description="Select ships to associate">
    <ng-template let-column="column" let-row="row">
      {{ row[column.field] }}
    </ng-template>
  </mrtm-multi-select-table>
  @if (totalItems() > pageSize) {
    <govuk-pagination
      fragment="ismShipsTable"
      [count]="this.totalItems()"
      [pageSize]="pageSize"
      (currentPageChange)="onPageChange($event)" />
  }
</mrtm-wizard-step>
<div>
  <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" aria-hidden="true" />
  <a govukLink [routerLink]="isEdit ? ['../../'] : ['../']">Return to: {{ returnToLabel }}</a>
</div>
