<mrtm-wizard-step
  (formSubmit)="onSubmit()"
  [caption]="emissionSourcesMap.title"
  [formGroup]="formGroup"
  [heading]="emissionSourcesMap?.emissionFactors?.title"
  [showReturnLink]="true"
  [isTwoThirds]="true">
  <h2 class="govuk-heading-m">Are you using default values for all emissions factors?</h2>
  <div [isInline]="true" formControlName="exist" govuk-radio>
    <govuk-radio-option [value]="true" label="Yes" />
    <govuk-radio-option [value]="false" label="No" />
  </div>

  @if (existCtrl.value === false) {
    <p class="govuk-body">
      Provide details of procedures, systems and responsibilities used to determine and update emission factors.
    </p>
    <mrtm-about-procedure-details />
    <mrtm-emp-procedure-form formGroupName="factors" />
  }
</mrtm-wizard-step>
