@if (data(); as data) {
  <netz-page-heading caption="Add a new data supplier">Check your answers</netz-page-heading>
  <dl govuk-summary-list>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Name of data supplier</dt>
      <dd govukSummaryListRowValue>{{ data.name }}</dd>
      <dd govukSummaryListRowActions>
        <a govukLink routerLink="../">Change</a>
      </dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Public key URL</dt>
      <dd govukSummaryListRowValue>{{ data.jwksUrl }}</dd>
      <dd govukSummaryListRowActions>
        <a govukLink routerLink="../">Change</a>
      </dd>
    </div>
  </dl>

  <div class="govuk-button-group">
    <button govukButton netzPendingButton type="submit" role="button" (click)="onSubmit()">Submit</button>
  </div>
}
