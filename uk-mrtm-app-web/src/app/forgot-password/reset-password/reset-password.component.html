<mrtm-wizard-step
  (formSubmit)="onSubmit()"
  [formGroup]="form"
  heading="Reset your password"
  submitText="Submit"
  [isTwoThirds]="true">
  <h2 class="govuk-heading-m">Enter your new password</h2>
  <mrtm-password
    passwordLabel="New password"
    confirmPasswordLabel="Confirm new password"
    [includeActivationMessage]="false" />
</mrtm-wizard-step>
