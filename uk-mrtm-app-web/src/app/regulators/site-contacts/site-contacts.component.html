@if (isEditable$ | async) {
  <form (ngSubmit)="onSave()" [formGroup]="form">
    <govuk-table [columns]="columns" [data]="tableData$ | async" formArrayName="siteContacts">
      <ng-template let-column="column" let-index="index" let-row="row">
        <ng-container [formGroupName]="index">
          @switch (column.field) {
            @case ('user') {
              <div
                [options]="assigneeOptions$ | async"
                formControlName="userId"
                govuk-select
                widthClass="govuk-!-width-full"></div>
            }
            @default {
              {{ row[column.field] }}
            }
          }
        </ng-container>
      </ng-template>
    </govuk-table>
    <ng-container *ngTemplateOutlet="pagination"></ng-container>
    <div class="govuk-button-group">
      <button netzPendingButton govukButton type="submit" class="govuk-!-margin-top-3">Save</button>
      <button govukSecondaryButton type="button" (click)="refresh$.next()">Discard changes</button>
    </div>
  </form>
} @else {
  <govuk-table id="regulators" [columns]="columns" [data]="tableData$ | async">
    <ng-template let-column="column" let-row="row">
      @switch (column.field) {
        @case ('user') {
          {{ row[column.field] ? (row[column.field] | userFullName) : 'Unassigned' }}
        }
        @default {
          {{ row[column.field] }}
        }
      }
    </ng-template>
  </govuk-table>
  <ng-container *ngTemplateOutlet="pagination"></ng-container>
}

<ng-template #pagination>
  <govuk-pagination
    fragment="regulators"
    (currentPageChange)="page$.next($event)"
    [count]="count$ | async"
    [pageSize]="pageSize" />
</ng-template>
