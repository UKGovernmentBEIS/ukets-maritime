@if (vm$ | async; as vm) {
  @if (vm.isSummaryDisplayed) {
    <govuk-error-summary [form]="searchForm"></govuk-error-summary>
  }
  <netz-page-heading size="xl">Accounts</netz-page-heading>
  <span class="govuk-hint">Enter ID, name or IMO number</span>
  <div class="govuk-grid-row">
    <form (ngSubmit)="onSearch()" [formGroup]="searchForm" id="search-form">
      <div class="govuk-grid-column-full">
        <div class="govuk-grid-row">
          <div class="govuk-grid-column-three-quarters">
            <div formControlName="term" govuk-text-input></div>
          </div>
          <div class="govuk-grid-column-one-quarter">
            <button netzPendingButton govukButton type="submit">Search</button>
          </div>
        </div>
      </div>
      <div class="govuk-grid-column-full">
        @if (vm.accounts?.length) {
          <mrtm-accounts-list [accounts]="vm.accounts" />
          @if (vm.total > vm.pageSize) {
            <govuk-pagination [count]="vm.total" (currentPageChange)="onPageChange($event)" [pageSize]="vm.pageSize" />
          }
        } @else {
          <div class="govuk-grid-row">
            <div class="govuk-grid-column-full">
              <p class="govuk-body" tabindex="-1">There are no results to show</p>
            </div>
          </div>
        }
      </div>
    </form>
  </div>
}
