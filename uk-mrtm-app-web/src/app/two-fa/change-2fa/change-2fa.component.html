@if (!is2FaChanged) {
  <mrtm-wizard-step
    (formSubmit)="onSubmit()"
    [formGroup]="form"
    submitText="Submit"
    caption="Change two factor authentication"
    heading="Enter the code shown in the authenticator app">
    <div
      formControlName="password"
      govuk-text-input
      label="Enter the 6-digit code"
      widthClass="govuk-!-width-one-third"></div>
  </mrtm-wizard-step>
} @else {
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <govuk-panel title="Two factor authentication update request successfully submitted." />
      <p class="govuk-body">We have sent a confirmation email to {{ userProfile()?.email }}</p>
      <h2 class="govuk-heading-m">What happens next</h2>
      <p class="govuk-body">
        Until your request is approved, you must use your current authenticator to sign in the Manage your UK ETS
        Reporting service.
      </p>
    </div>
  </div>
}
