<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    @if (isSummaryDisplayed) {
      <govuk-error-summary [form]="form" />
    }
    <netz-page-heading caption="Create user account" size="xl">Choose a password</netz-page-heading>
    <form (ngSubmit)="submitPassword()" [formGroup]="form">
      <mrtm-password />
      <button govukButton type="submit">Continue</button>
    </form>
  </div>
</div>
