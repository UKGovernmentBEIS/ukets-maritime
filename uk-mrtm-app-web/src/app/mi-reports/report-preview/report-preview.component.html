<mrtm-wizard-step [heading]="title" [formGroup]="formGroup" [hideSubmit]="true">
  @if (reportFormComponent) {
    <ng-template [formGroup]="formGroup" [ngComponentOutlet]="reportFormComponent" />
  }

  <div class="govuk-button-group">
    <button netzPendingButton govukButton type="submit" (click)="generateReport()">Execute</button>
    <button netzPendingButton govukButton type="submit" (click)="exportToExcel()">Export to excel</button>
  </div>

  @if (reportData(); as reportData) {
    <div>
      @if (reportData?.results?.length) {
        <govuk-table
          id="report"
          [columns]="tableColumns()"
          [data]="tableData()"
          description="Report data"
          mrtmScrollablePane
          ariaLabel="Report data" />

        @if (reportData?.results?.length > pageSize) {
          <govuk-pagination
            fragment="report"
            [count]="reportData?.results?.length"
            (currentPageChange)="currentPage.set($event)"
            [pageSize]="pageSize" />
        }
      }
    </div>
  }
</mrtm-wizard-step>
