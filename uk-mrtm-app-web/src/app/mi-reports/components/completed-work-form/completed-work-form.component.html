<div formControlName="option" govuk-radio legend="Completed Work Report Options" legendSize="medium">
  <govuk-radio-option value="LAST_30_DAYS" label="Last 30 days" />

  <govuk-radio-option value="ANNUAL" label="Annual">
    <div govukConditionalContent>
      <div class="govuk-grid-row">
        <div class="govuk-grid-column-one-half">
          <div formControlName="year" govuk-text-input inputType="number" label="Provide year"></div>
        </div>
      </div>
    </div>
  </govuk-radio-option>
  <govuk-radio-option value="CUSTOM_PERIOD" label="Select specific period">
    <ng-container govukConditionalContent>
      <div
        label="From"
        mrtm-date-picker
        formControlName="fromDate"
        hint="For example, 17/5/2024"
        widthClass="govuk-input--width-10"></div>
      <div
        label="To"
        mrtm-date-picker
        formControlName="toDate"
        hint="For example, 17/5/2024"
        widthClass="govuk-input--width-10"></div>
    </ng-container>
  </govuk-radio-option>
</div>
