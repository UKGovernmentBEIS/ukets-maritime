<netz-page-heading size="xl">MI Reports</netz-page-heading>

<govuk-table id="mi-reports" [columns]="tableColumns" [data]="currentPageData$ | async">
  <ng-template let-column="column" let-row="row">
    @switch (column.field) {
      @default {
        <a [routerLink]="miReportTypeLinkMap[row.miReportType]" govukLink>{{ row[column.field] }}</a>
      }
    }
  </ng-template>
</govuk-table>
@if ((totalPages$ | async) > pageSize) {
  <govuk-pagination
    fragment="mi-reports"
    (currentPageChange)="currentPage$.next($event)"
    [count]="totalPages$ | async"
    [pageSize]="pageSize" />
}
