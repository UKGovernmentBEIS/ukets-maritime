<netz-page-heading size="xl">MI Reports</netz-page-heading>

<govuk-table id="mi-reports" [columns]="tableColumns" [data]="currentPageData()">
  <ng-template let-column="column" let-row="row">
    @switch (column.field) {
      @default {
        <a [routerLink]="miReportTypeLinkMap[row.miReportType]" govukLink>{{ row[column.field] }}</a>
      }
    }
  </ng-template>
</govuk-table>

@if (data()?.length > pageSize) {
  <govuk-pagination
    fragment="mi-reports"
    [count]="data().length"
    [pageSize]="pageSize"
    (currentPageChange)="currentPage.set($event)" />
}
