<govuk-table [columns]="columns()" [data]="data()" emptyTableText="No data supplier appointed">
  <ng-template let-column="column" let-row="row">
    @if (column.field === 'actions') {
      <div class="govuk-!-text-align-right">
        <a govukLink [routerLink]="[routePrefix(), 'appoint']" [queryParams]="{ dataSupplierId: row?.['id'] }">
          Replace or remove
        </a>
      </div>
    } @else {
      {{ row[column.field] }}
    }
  </ng-template>
</govuk-table>
