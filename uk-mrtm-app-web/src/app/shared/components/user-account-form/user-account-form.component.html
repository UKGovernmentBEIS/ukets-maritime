<div formControlName="firstName" govuk-text-input label="First name" widthClass="govuk-!-width-one-half"></div>
<div formControlName="lastName" govuk-text-input label="Last name" widthClass="govuk-!-width-one-half"></div>

@if (formMode() === 'EDIT') {
  @switch (phoneType()) {
    @case ('full') {
      <div
        mrtm-phone-input
        formControlName="phoneNumber"
        label="Phone number"
        widthClass="govuk-!-width-one-half"></div>
      <div
        mrtm-phone-input
        formControlName="mobileNumber"
        label="Mobile number (optional)"
        widthClass="govuk-!-width-one-half"></div>
    }
    @case ('national') {
      <div
        formControlName="phoneNumber"
        govuk-text-input
        label="Telephone number"
        hint="You must include the country code"
        inputType="tel"
        widthClass="govuk-!-width-one-half"></div>
      <div
        formControlName="mobileNumber"
        govuk-text-input
        label="Mobile number (optional)"
        hint="You must include the country code"
        inputType="tel"
        widthClass="govuk-!-width-one-half"></div>
    }
  }
}

<div
  formControlName="email"
  govuk-text-input
  [hint]="emailHint()"
  inputType="email"
  label="Email address"
  widthClass="govuk-!-width-one-half"></div>
