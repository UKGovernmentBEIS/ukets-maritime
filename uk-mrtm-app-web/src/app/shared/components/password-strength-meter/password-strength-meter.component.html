<mrtm-progress-bar [progressValue]="passwordStrength()" ariaLabel="Password strength" />
@if (enableFeedback() && feedback()) {
  @if (feedback().warning) {
    <div class="govuk-hint">
      {{ feedback().warning }}
    </div>
  }

  @if (feedback().suggestions && feedback().suggestions.length) {
    <div class="govuk-hint">
      @for (suggestion of feedback().suggestions; track suggestion) {
        {{ suggestion }}{{ $last ? '' : ' ' }}
      }
    </div>
  }
}
