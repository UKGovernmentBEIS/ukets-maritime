@if (data(); as data) {
  <dl govuk-summary-list [hasBottomMargin]="hasBottomMargin()" [class.govuk-!-margin-bottom-0]="!hasBottomMargin()">
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Total Maritime Emissions</dt>
      <dd govukSummaryListRowValue>{{ data?.totalShipEmissionsSummary }} tCO2e</dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Less Northern Ireland surrender deduction</dt>
      <dd govukSummaryListRowValue>{{ data?.lessVoyagesInNorthernIrelandDeduction?.total | bigNumber: 0 }} tCO2e</dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Emissions figure for surrender</dt>
      <dd govukSummaryListRowValue>{{ data?.surrenderEmissionsSummary }} tCO2e</dd>
    </div>
  </dl>
}
