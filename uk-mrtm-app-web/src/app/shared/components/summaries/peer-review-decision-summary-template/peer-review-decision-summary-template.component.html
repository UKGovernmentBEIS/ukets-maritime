<h2 class="govuk-heading-m">Decision details</h2>
<dl govuk-summary-list>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>{{ map.decision }}</dt>
    <dd govukSummaryListRowValue>
      {{ decision.type | peerReviewDecision }}
    </dd>
    @if (isEditable) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="changeLink" [queryParams]="queryParams">Change</a>
      </dd>
    }
  </div>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>{{ map.notes }}</dt>
    <dd govukSummaryListRowValue class="pre-wrap" [notProvided]="decision.notes"></dd>
    @if (isEditable) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="changeLink" [queryParams]="queryParams">Change</a>
      </dd>
    }
  </div>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Peer reviewer</dt>
    <dd govukSummaryListRowValue [notProvided]="peerReviewer"></dd>
    @if (isEditable) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="changeLink" [queryParams]="queryParams">Change</a>
      </dd>
    }
  </div>
</dl>
