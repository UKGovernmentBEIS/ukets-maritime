@if (combinedFuelsEmissionsFactors()?.length > 0) {
  <div class="govuk-grid-row">
    <h2 class="govuk-heading-m govuk-grid-column-two-thirds">Fuels and emissions factors</h2>
    @if (isEditable()) {
      <div class="govuk-grid-column-one-third govuk-!-text-align-right govuk-body">
        <a govukLink class="govuk-link--no-visited-state" [routerLink]="changeLinkList()" [queryParams]="queryParams()">
          Change
          <span class="govuk-visually-hidden">fuels and emissions factors</span>
        </a>
      </div>
    }
  </div>

  @for (factor of combinedFuelsEmissionsFactors(); track $index) {
    <mrtm-fuels-and-emission-factors-summary-template
      [fuelEmissionsFactor]="factor?.current"
      [originalFuelEmissionsFactor]="factor?.previous"
      (delete)="onDeleteFuelEmission($event)"
      [changeLink]="changeLinkForm()"
      [index]="$index"
      [isEditable]="isEditable()" />
  }

  @if (isEditable()) {
    <p class="govuk-body">
      <button (click)="handleAddAnother()" govukButton govukSecondaryButton type="button">Add another item</button>
    </p>
  }
}
