@if (data(); as data) {
  <h2 class="govuk-heading-m">Decision details</h2>
  <dl govuk-summary-list>
    @if (data?.determination?.type === 'APPROVED') {
      <div govukSummaryListRow>
        <dt govukSummaryListRowKey>Emissions plan</dt>
        <dd govukSummaryListRowValue>
          <mrtm-summary-download-files [files]="data?.empFile" />
        </dd>
      </div>
      <div govukSummaryListRow>
        <dt govukSummaryListRowKey>Emissions plan application</dt>
        <dd govukSummaryListRowValue>
          <a govukLink [routerLink]="[data?.empApplication?.url]">{{ data?.empApplication?.title }}</a>
        </dd>
      </div>
    }
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Decision</dt>
      <dd govukSummaryListRowValue>{{ data?.determination?.type | determinationType }}</dd>
    </div>
    @if (userRole() === 'REGULATOR') {
      <div govukSummaryListRow>
        <dt govukSummaryListRowKey>Reason for decision</dt>
        <dd govukSummaryListRowValue [notProvided]="data?.determination?.reason"></dd>
      </div>
    }
  </dl>

  <mrtm-recipients-partial-summary-template [officialNoticeInfo]="officialNoticeInfo()" />
}
