@if (accountClosure(); as accountClosure) {
  <h2 class="govuk-heading-m">Details</h2>
  <dl govuk-summary-list>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Reason</dt>
      <dd govukSummaryListRowValue>{{ accountClosure.reason }}</dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Closed by</dt>
      <dd govukSummaryListRowValue>{{ accountClosure.submitter }}</dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Date</dt>
      <dd govukSummaryListRowValue>{{ accountClosure.closureDate | govukDate: 'datetime' }}</dd>
    </div>
  </dl>
}
