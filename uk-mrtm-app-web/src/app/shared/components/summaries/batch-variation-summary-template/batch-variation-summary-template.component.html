<h3 class="govuk-heading-m">Batch variation details</h3>
<dl govuk-summary-list [hasBorders]="true">
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Signatory</dt>
    <dd govukSummaryListRowValue [notProvided]="data()?.signatory"></dd>
    @if (isEditable()) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="[wizardStep()?.SIGNATURE]" [queryParams]="queryParams()">Change</a>
      </dd>
    }
  </div>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Summary of changes</dt>
    <dd govukSummaryListRowValue [notProvided]="data()?.summary"></dd>
    @if (isEditable()) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="[wizardStep()?.EMP_LOG]" [queryParams]="queryParams()">Change</a>
      </dd>
    }
  </div>
</dl>
