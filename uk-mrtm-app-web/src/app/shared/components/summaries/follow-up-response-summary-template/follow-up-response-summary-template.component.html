<h2 class="govuk-heading-m">Request details</h2>
<dl govuk-summary-list>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Request from the regulator</dt>
    <dd govukSummaryListRowValue class="pre-wrap" [notProvided]="followUpResponse()?.request"></dd>
    <dd govukSummaryListRowActions></dd>
  </div>
</dl>

<h2 class="govuk-heading-m">Response details</h2>
<dl govuk-summary-list [hasBorders]="true">
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Response</dt>
    <dd govukSummaryListRowValue class="pre-wrap" [notProvided]="followUpResponse()?.response"></dd>
    @if (changeLink() && queryParams()['change']) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="[changeLink()]" [queryParams]="queryParams()">Change</a>
      </dd>
    }
  </div>
  <div govukSummaryListRow>
    <dt govukSummaryListRowKey>Supporting documents</dt>
    <dd govukSummaryListRowValue>
      <mrtm-summary-download-files [files]="followUpResponse()?.attachments" />
    </dd>
    @if (changeLink() && queryParams()['change']) {
      <dd govukSummaryListRowActions>
        <a govukLink [routerLink]="[changeLink()]" [queryParams]="queryParams()">Change</a>
      </dd>
    }
  </div>
</dl>
