@if (data(); as data) {
  <dl govuk-summary-list [hasBottomMargin]="false">
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Payment status</dt>
      <dd govukSummaryListRowValue>{{ data?.status | paymentStatus }}</dd>
    </div>
    <div govukSummaryListRow>
      <dt govukSummaryListRowKey>Reason</dt>
      <dd govukSummaryListRowValue class="pre-wrap">{{ data?.cancellationReason }}</dd>
    </div>
  </dl>
}
