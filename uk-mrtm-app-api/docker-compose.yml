version: "3"

services:
  postgres-mrtm:
    image: postgres
    volumes:
      - postgres-data-mrtm:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mrtm
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - 5439:5432

volumes:
  postgres-data-mrtm:
    driver: local
